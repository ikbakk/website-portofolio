<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="Mock of the Sungkar Group Indonesia tourism marketing site for Lombok, Sumbawa, and Labuan Bajo">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1d2e"/>
      <stop offset="60%" stop-color="#1c3a52"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2a3a"/>
      <stop offset="100%" stop-color="#06121a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15263a"/>
      <stop offset="100%" stop-color="#0d1a28"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.28" r="0.18">
      <stop offset="0%" stop-color="#fde6a4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fde6a4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hero / sky background -->
  <rect width="1280" height="800" fill="url(#sky)"/>
  <rect width="1280" height="800" fill="url(#sun)"/>

  <!-- Distant island silhouette -->
  <path d="M0 460 L120 430 L210 450 L320 420 L420 445 L520 425 L640 450 L760 430 L880 455 L1000 435 L1130 460 L1280 440 L1280 800 L0 800 Z" fill="#0a1a28" opacity="0.95"/>
  <path d="M0 510 L160 480 L280 505 L420 485 L560 510 L700 490 L840 515 L980 495 L1120 520 L1280 500 L1280 800 L0 800 Z" fill="#070f19"/>

  <!-- Sea -->
  <rect x="0" y="540" width="1280" height="260" fill="url(#sea)"/>
  <!-- Subtle waves -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none">
    <path d="M0 600 Q 160 596 320 600 T 640 600 T 960 600 T 1280 600"/>
    <path d="M0 650 Q 160 646 320 650 T 640 650 T 960 650 T 1280 650"/>
    <path d="M0 700 Q 160 696 320 700 T 640 700 T 960 700 T 1280 700"/>
  </g>

  <!-- Topbar -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="1280" height="64" fill="rgba(8,14,22,0.6)"/>
    <line x1="0" y1="64" x2="1280" y2="64" stroke="rgba(255,255,255,0.08)"/>
    <text x="40" y="40" fill="#f5f6f7" font-size="16" font-weight="700">Sungkar Group Indonesia</text>
    <g fill="#cfd3da" font-size="12">
      <text x="780" y="40">Beranda</text>
      <text x="850" y="40">Paket Wisata</text>
      <text x="950" y="40">Destinasi</text>
      <text x="1040" y="40">Ulasan</text>
      <text x="1110" y="40">Kontak</text>
    </g>
    <rect x="1180" y="20" width="60" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.3)"/>
    <text x="1210" y="36" fill="#cfd3da" font-size="11" text-anchor="middle">العربية</text>
  </g>

  <!-- Hero copy -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="40" y="220" fill="#9fe8c2" font-size="13" font-weight="600" letter-spacing="2">PRIVATE TOUR · PAKET WISATA</text>
    <text x="40" y="280" fill="#f5f6f7" font-size="42" font-weight="700">Liburan Lombok yang</text>
    <text x="40" y="328" fill="#f5f6f7" font-size="42" font-weight="700">lebih praktis.</text>
    <text x="40" y="372" fill="#9ca3af" font-size="14">Rencanakan private tour Lombok, paket wisata, open trip, dan</text>
    <text x="40" y="392" fill="#9ca3af" font-size="14">transportasi bersama tim lokal Sungkar Group.</text>

    <rect x="40" y="430" width="160" height="44" rx="6" fill="#34d399"/>
    <text x="120" y="458" fill="#0a0f17" font-size="13" font-weight="600" text-anchor="middle">Konsultasi Trip</text>
    <rect x="216" y="430" width="160" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.4)"/>
    <text x="296" y="458" fill="#f5f6f7" font-size="13" font-weight="600" text-anchor="middle">Lihat Paket</text>
  </g>

  <!-- Paket populer (4 cards) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="40" y="540" fill="#f5f6f7" font-size="16" font-weight="700">Paket paling populer</text>

    <g transform="translate(40, 560)">
      <rect width="280" height="170" rx="10" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#0a0f17"/>
      <circle cx="140" cy="45" r="22" fill="#34d399" opacity="0.85"/>
      <path d="M132 45 L138 51 L150 39" stroke="#0a0f17" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="14" y="118" fill="#9fe8c2" font-size="10" letter-spacing="1">3 HARI · 2 MALAM</text>
      <text x="14" y="138" fill="#f5f6f7" font-size="13" font-weight="600">Snorkeling 3 Gili</text>
      <text x="14" y="156" fill="#9ca3af" font-size="11">Lombok · Mandalika</text>
    </g>

    <g transform="translate(340, 560)">
      <rect width="280" height="170" rx="10" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#0a0f17"/>
      <rect x="40" y="20" width="200" height="50" rx="4" fill="#1c3a52"/>
      <rect x="60" y="32" width="160" height="6" rx="3" fill="#9fe8c2" opacity="0.7"/>
      <rect x="60" y="46" width="100" height="6" rx="3" fill="#9fe8c2" opacity="0.4"/>
      <text x="14" y="118" fill="#9fe8c2" font-size="10" letter-spacing="1">4 HARI · 3 MALAM</text>
      <text x="14" y="138" fill="#f5f6f7" font-size="13" font-weight="600">MotoGP Mandalika 2026</text>
      <text x="14" y="156" fill="#9ca3af" font-size="11">Lombok · Open Trip</text>
    </g>

    <g transform="translate(640, 560)">
      <rect width="280" height="170" rx="10" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#0a0f17"/>
      <ellipse cx="140" cy="45" rx="60" ry="14" fill="#34d399" opacity="0.5"/>
      <path d="M80 45 Q 140 30 200 45" stroke="#9fe8c2" stroke-width="1" fill="none"/>
      <text x="14" y="118" fill="#9fe8c2" font-size="10" letter-spacing="1">3 HARI · 2 MALAM</text>
      <text x="14" y="138" fill="#f5f6f7" font-size="13" font-weight="600">Whale Shark Sumbawa</text>
      <text x="14" y="156" fill="#9ca3af" font-size="11">Saleh Bay · Open Trip</text>
    </g>

    <g transform="translate(940, 560)">
      <rect width="280" height="170" rx="10" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="0" y="0" width="280" height="90" rx="10" fill="#0a0f17"/>
      <path d="M40 60 L100 30 L160 50 L220 25 L240 45 L240 80 L40 80 Z" fill="#1c3a52"/>
      <circle cx="200" cy="32" r="8" fill="#fde6a4" opacity="0.9"/>
      <text x="14" y="118" fill="#9fe8c2" font-size="10" letter-spacing="1">PHINISI · 3 HARI</text>
      <text x="14" y="138" fill="#f5f6f7" font-size="13" font-weight="600">Open Trip Komodo</text>
      <text x="14" y="156" fill="#9ca3af" font-size="11">Labuan Bajo · Phinisi</text>
    </g>
  </g>

  <!-- Bottom: destinations strip -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="40" y="772" fill="#6b7280" font-size="10" letter-spacing="2">DESTINATIONS · LOMBOK · SUMBAWA · LABUAN BAJO</text>
    <text x="1240" y="772" fill="#6b7280" font-size="10" text-anchor="end">Astro · i18n · Schema.org · WebP · Core Web Vitals green</text>
  </g>
</svg>
